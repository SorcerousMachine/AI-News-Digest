baseURL = "https://sorcerousmachine.com/ai-news-digest"
languageCode = "en-us"
title = "AI News Digest"
buildFuture = true
timeZone = "UTC"

[params]
  description = "Daily AI industry digest. Automated collection and analysis."
  author = "AI News Digest Pipeline"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = false

enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "ROBOTS"]

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"

[pagination]
  pagerSize = 30
